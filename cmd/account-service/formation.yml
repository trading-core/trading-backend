---
- name: Render account-service
  include_tasks: "{{ playbook_dir }}/tasks/render-service.yml"
  vars:
    service_name: account-service
    cmd_dir: cmd/account-service
    env_dest: backend/account-service/.env
    resources:
      secrets: [token, broker_credentials]
      logs:    [account_event_log]
      apis:    [trading_api, frontend]
