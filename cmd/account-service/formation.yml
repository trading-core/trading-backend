---
- name: Render account-service .env
  vars:
    service_environment:
      BROKER_CREDENTIALS_B64_JSON: "{{ broker_credentials_b64_json }}"
      AUTH_JWT_SECRET: change-me-in-production
      DEFAULT_BROKER_ACCOUNT_ID: 6AB16514
  template:
    src: "{{ playbook_dir }}/templates/service.env.j2"
    dest: account-service/.env
    mode: '0600'