---
- name: Render bot-service
  include_tasks: "{{ playbook_dir }}/tasks/render-service.yml"
  vars:
    service_name: bot-service
    cmd_dir: cmd/bot-service
    env_dest: backend/bot-service/.env
    resources:
      secrets: [token, broker_credentials]
      logs:    [bot_event_log]
      clients: [account_service]
