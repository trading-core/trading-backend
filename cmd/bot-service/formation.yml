---
- name: Render bot-service .env
  vars:
    service_environment:
      BROKER_CREDENTIALS_B64_JSON: "{{ broker_credentials_b64_json }}"
      TOKEN_SECRET: "{{ token_secret }}"
      ACCOUNT_SERVICE_CLIENT_IMPLEMENTATION: "HTTP"
      ACCOUNT_SERVICE_SCHEME: "http"
      ACCOUNT_SERVICE_HOST: "account-service"
      ACCOUNT_SERVICE_PORT: "9000"
  template:
    src: "{{ playbook_dir }}/templates/service.env.j2"
    dest: backend/bot-service/.env
    mode: '0600'
