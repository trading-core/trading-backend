---
- name: Render reporting-service
  include_tasks: "{{ playbook_dir }}/tasks/render-service.yml"
  vars:
    service_name: reporting-service
    cmd_dir: cmd/reporting-service
    env_dest: backend/reporting-service/.env
    resources:
      secrets: [token, alpaca]
      apis:    [alpaca]
      logs:    [reporting_event_log]
      clients: [storage_service]
