---
- name: Render stock-screener
  include_tasks: "{{ playbook_dir }}/tasks/render-service.yml"
  vars:
    service_name: stock-screener
    cmd_dir: cmd/stock-screener
    env_dest: backend/stock-screener/.env
    resources:
      secrets: [token, alpaca]
      apis:    [alpaca, cnn_market_sentiment]
