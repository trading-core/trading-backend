---
- name: Render storage-service
  include_tasks: "{{ playbook_dir }}/tasks/render-service.yml"
  vars:
    service_name: storage-service
    cmd_dir: cmd/storage-service
    env_dest: backend/storage-service/.env
    resources:
      secrets: [token]
      logs:    [storage_event_log]
      storage: [filesystem]
